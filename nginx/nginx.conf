server {
    listen 80;

    location /api/ {
        proxy_pass http://backend-api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /mcp/metadata {
        proxy_pass http://mcp-server:9001/metadata;
        proxy_set_header Host $host;
    }

    location = /mcp/sse {
        proxy_pass http://mcp-server:9001/sse;
        proxy_set_header Host $host;
    }

    location /mcp/ {
        return 403;
    }

    location /llm/ {
        proxy_pass http://llm-gateway:11434/;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://backend-api:8000/health;
    }

    location / {
        return 200 "VulnReport AI Portal lab is running.\n";
        add_header Content-Type text/plain;
    }
}

server {
    listen 9001;

    location = /metadata {
        proxy_pass http://mcp-server:9001/metadata;
        proxy_set_header Host $host;
    }

    location = /sse {
        proxy_pass http://mcp-server:9001/sse;
        proxy_set_header Host $host;
    }

    location / {
        return 403;
    }
}
