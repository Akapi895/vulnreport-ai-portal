services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "9001:9001"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-api
      - llm-gateway
      - mcp-server
      - frontend

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend-api

  backend-api:
    build: ./backend
    volumes:
      - ./backend/flags/admin_flag.txt:/app/flags/admin_flag.txt:ro
    environment:
      DATABASE_URL: postgresql://vulnapp:vulnpass123@postgres:5432/vulnreport
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vulnreport
      DB_USER: vulnapp
      DB_PASSWORD: vulnpass123
      PATH4_FLAG: ${PATH4_FLAG}
      LLM_URL: http://llm-gateway:11434
      LLM_MODEL: qwen2.5
      LLM_TIMEOUT_SECONDS: 120
      CORS_ORIGINS: http://localhost,http://localhost:5173
      MCP_URL: http://mcp-server:9001
      CHROMA_HOST: vector-db
      CHROMA_PORT: 8000
      CHROMA_COLLECTION: vulnreport_reports
      EMBEDDING_MODEL: nomic-embed-text
      LAB_MODE: "true"
      ENABLE_VULN_NOTE_IDOR: "true"
      ENABLE_VULN_FETCH_HEADER_FORWARD: "true"
      ENABLE_VULN_MCP_SECRET_LEAK: "true"
      ENABLE_VULN_RAG_POISONING: "true"
      AUTO_SEED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      mcp-server:
        condition: service_started
      ollama-pull-models:
        condition: service_completed_successfully
      vector-db:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vulnreport
      POSTGRES_USER: vulnapp
      POSTGRES_PASSWORD: vulnpass123
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vulnapp -d vulnreport"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  vector-db:
    image: chromadb/chroma:0.5.23
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat', timeout=2).read()\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  llm-gateway:
    image: ollama/ollama:0.5.4
    ports:
      - "8080:11434"
    volumes:
      - ollama-data:/root/.ollama

  ollama-pull-models:
    image: ollama/ollama:0.5.4
    environment:
      OLLAMA_HOST: http://llm-gateway:11434
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "until ollama list >/dev/null 2>&1; do sleep 2; done;
      ollama pull nomic-embed-text;
      ollama pull qwen2.5"
    depends_on:
      llm-gateway:
        condition: service_started

  mcp-server:
    build: ./mcp-server
    environment:
      LAB_MODE: "true"
      ENABLE_VULN_MCP_SECRET_LEAK: "true"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vulnreport
      DB_USER: vulnapp
      DB_PASSWORD: vulnpass123
      PATH4_FLAG: ${PATH4_FLAG}

volumes:
  postgres-data:
  ollama-data:
